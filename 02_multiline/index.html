<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.3em;
            margin-bottom: 20px;
            height: 30px;
            color: #667eea;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            margin-bottom: 30px;
            background: #333;
            padding: 5px;
            border-radius: 5px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: white;
            border: none;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s ease;
            color: #333;
        }

        .cell:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        .reset-btn {
            margin-top: 20px;
        }

        .score {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }

        .score div {
            padding: 10px 20px;
            background: #f5f5f5;
            border-radius: 5px;
            min-width: 150px;
        }

        .current-points {
            margin-top: 15px;
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        <div class="current-points">
            X Points: <span id="xPoints">0</span> | O Points: <span id="oPoints">0</span>
        </div>
        <div class="score">
            <div>X Games: <span id="xWins">0</span></div>
            <div>Ties: <span id="draws">0</span></div>
            <div>O Games: <span id="oWins">0</span></div>
        </div>
    </div>

    <script>
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let xGameWins = 0;
        let oGameWins = 0;
        let ties = 0;
        let xPoints = 0;
        let oPoints = 0;

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        const cells = document.querySelectorAll('.cell');
        const statusDiv = document.getElementById('status');

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function handleCellClick(e) {
            const cell = e.target;
            const index = cell.getAttribute('data-index');

            if (gameBoard[index] !== '' || !gameActive) {
                return;
            }

            gameBoard[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());

            checkForLines();
            checkGameStatus();
        }

        function checkForLines() {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameBoard[a] === '' || gameBoard[b] === '' || gameBoard[c] === '') {
                    continue;
                }
                if (gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                    if (currentPlayer === 'X') {
                        xPoints++;
                        document.getElementById('xPoints').textContent = xPoints;
                        statusDiv.textContent = `Player X completed a line! +1 Point`;
                    } else {
                        oPoints++;
                        document.getElementById('oPoints').textContent = oPoints;
                        statusDiv.textContent = `Player O completed a line! +1 Point`;
                    }
                    return;
                }
            }
        }

        function checkGameStatus() {
            if (!gameBoard.includes('')) {
                gameActive = false;
                let winner;
                if (xPoints > oPoints) {
                    winner = 'X';
                    xGameWins++;
                    document.getElementById('xWins').textContent = xGameWins;
                } else if (oPoints > xPoints) {
                    winner = 'O';
                    oGameWins++;
                    document.getElementById('oWins').textContent = oGameWins;
                } else {
                    winner = 'Tie';
                    ties++;
                    document.getElementById('draws').textContent = ties;
                }
                statusDiv.textContent = `Game Over! X: ${xPoints} | O: ${oPoints} | Winner: ${winner}`;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusDiv.textContent = `Player ${currentPlayer}'s Turn`;
        }

        function resetGame() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            xPoints = 0;
            oPoints = 0;
            statusDiv.textContent = `Player ${currentPlayer}'s Turn`;
            document.getElementById('xPoints').textContent = '0';
            document.getElementById('oPoints').textContent = '0';

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>

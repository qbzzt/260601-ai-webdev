<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            perspective: 1200px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            perspective: 1200px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.3em;
            margin-bottom: 20px;
            height: 30px;
            color: #667eea;
            font-weight: bold;
        }

        .boards-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .board-wrapper {
            text-align: center;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .board-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            font-size: 1.1em;
            position: relative;
            z-index: 10;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 4px;
            background: #333;
            padding: 4px;
            border-radius: 5px;
            transform: rotateX(25deg) rotateZ(45deg);
            transform-style: preserve-3d;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .board-wrapper:nth-child(1) .board {
            transform: rotateX(25deg) rotateZ(45deg) translateZ(0px);
        }

        .board-wrapper:nth-child(2) .board {
            transform: rotateX(25deg) rotateZ(45deg) translateZ(80px);
        }

        .board-wrapper:nth-child(3) .board {
            transform: rotateX(25deg) rotateZ(45deg) translateZ(160px);
        }

        .cell {
            width: 80px;
            height: 80px;
            background: white;
            border: none;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s ease;
            color: #333;
        }

        .cell:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        .reset-btn {
            margin-top: 20px;
        }

        .current-points {
            margin-top: 15px;
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }

        .score {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }

        .score div {
            padding: 10px 20px;
            background: #f5f5f5;
            border-radius: 5px;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3D Tic-Tac-Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        
        <div class="boards-container">
            <div class="board-wrapper">
                <div class="board-label">Layer 1</div>
                <div class="board" id="board0">
                    <button class="cell" data-index="0"></button>
                    <button class="cell" data-index="1"></button>
                    <button class="cell" data-index="2"></button>
                    <button class="cell" data-index="3"></button>
                    <button class="cell" data-index="4"></button>
                    <button class="cell" data-index="5"></button>
                    <button class="cell" data-index="6"></button>
                    <button class="cell" data-index="7"></button>
                    <button class="cell" data-index="8"></button>
                </div>
            </div>
            <div class="board-wrapper">
                <div class="board-label">Layer 2</div>
                <div class="board" id="board1">
                    <button class="cell" data-index="9"></button>
                    <button class="cell" data-index="10"></button>
                    <button class="cell" data-index="11"></button>
                    <button class="cell" data-index="12"></button>
                    <button class="cell" data-index="13"></button>
                    <button class="cell" data-index="14"></button>
                    <button class="cell" data-index="15"></button>
                    <button class="cell" data-index="16"></button>
                    <button class="cell" data-index="17"></button>
                </div>
            </div>
            <div class="board-wrapper">
                <div class="board-label">Layer 3</div>
                <div class="board" id="board2">
                    <button class="cell" data-index="18"></button>
                    <button class="cell" data-index="19"></button>
                    <button class="cell" data-index="20"></button>
                    <button class="cell" data-index="21"></button>
                    <button class="cell" data-index="22"></button>
                    <button class="cell" data-index="23"></button>
                    <button class="cell" data-index="24"></button>
                    <button class="cell" data-index="25"></button>
                    <button class="cell" data-index="26"></button>
                </div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        <div class="current-points">
            X Points: <span id="xPoints">0</span> | O Points: <span id="oPoints">0</span>
        </div>
        <div class="score">
            <div>X Games: <span id="xWins">0</span></div>
            <div>Ties: <span id="draws">0</span></div>
            <div>O Games: <span id="oWins">0</span></div>
        </div>
    </div>

    <script>
        let gameBoard = Array(27).fill('');
        let currentPlayer = 'X';
        let gameActive = true;
        let xGameWins = 0;
        let oGameWins = 0;
        let ties = 0;
        let xPoints = 0;
        let oPoints = 0;

        // All possible winning lines in 3x3x3 cube
        // Using index = z*9 + y*3 + x where z is layer (0-2), y is row (0-2), x is col (0-2)
        const winningConditions = [
            // Horizontal lines in each layer (x varies)
            [0, 1, 2], [3, 4, 5], [6, 7, 8],                    // Layer 0
            [9, 10, 11], [12, 13, 14], [15, 16, 17],            // Layer 1
            [18, 19, 20], [21, 22, 23], [24, 25, 26],           // Layer 2
            
            // Vertical lines within each layer (y varies)
            [0, 3, 6], [1, 4, 7], [2, 5, 8],                    // Layer 0
            [9, 12, 15], [10, 13, 16], [11, 14, 17],            // Layer 1
            [18, 21, 24], [19, 22, 25], [20, 23, 26],           // Layer 2
            
            // Diagonals in each layer (xy plane diagonals)
            [0, 4, 8], [2, 4, 6],                               // Layer 0
            [9, 13, 17], [11, 13, 15],                          // Layer 1
            [18, 22, 26], [20, 22, 24],                         // Layer 2
            
            // Vertical lines through layers (z varies)
            [0, 9, 18], [1, 10, 19], [2, 11, 20],               // Column 0
            [3, 12, 21], [4, 13, 22], [5, 14, 23],              // Column 1
            [6, 15, 24], [7, 16, 25], [8, 17, 26],              // Column 2
            
            // Diagonals in xz plane (y constant)
            [0, 10, 20], [2, 12, 22],                           // Row 0
            [3, 13, 23], [5, 15, 21],                           // Row 1
            [6, 16, 26], [8, 14, 20],                           // Row 2
            
            // Diagonals in yz plane (x constant)
            [0, 12, 24], [6, 12, 18],                           // Column 0
            [1, 13, 25], [7, 13, 19],                           // Column 1
            [2, 14, 26], [8, 14, 20],                           // Column 2
            
            // 3D diagonals
            [0, 13, 26], [2, 13, 24], [6, 13, 20], [8, 13, 18]
        ];

        const cells = document.querySelectorAll('.cell');
        const statusDiv = document.getElementById('status');

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (gameBoard[index] !== '' || !gameActive) {
                return;
            }

            gameBoard[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());

            checkForLines();
            checkGameStatus();
        }

        function checkForLines() {
            const completedLines = [];
            
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameBoard[a] === '' || gameBoard[b] === '' || gameBoard[c] === '') {
                    continue;
                }
                if (gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c] && gameBoard[a] === currentPlayer) {
                    // Check if this line wasn't already counted
                    const lineKey = [a, b, c].sort().join(',');
                    if (!completedLines.find(l => l.key === lineKey)) {
                        completedLines.push({ key: lineKey, line: [a, b, c] });
                    }
                }
            }

            if (completedLines.length > 0) {
                if (currentPlayer === 'X') {
                    xPoints += completedLines.length;
                    document.getElementById('xPoints').textContent = xPoints;
                    statusDiv.textContent = `Player X completed ${completedLines.length} line(s)! +${completedLines.length} Point(s)`;
                } else {
                    oPoints += completedLines.length;
                    document.getElementById('oPoints').textContent = oPoints;
                    statusDiv.textContent = `Player O completed ${completedLines.length} line(s)! +${completedLines.length} Point(s)`;
                }
            }
        }

        function checkGameStatus() {
            if (!gameBoard.includes('')) {
                gameActive = false;
                let winner;
                if (xPoints > oPoints) {
                    winner = 'X';
                    xGameWins++;
                    document.getElementById('xWins').textContent = xGameWins;
                } else if (oPoints > xPoints) {
                    winner = 'O';
                    oGameWins++;
                    document.getElementById('oWins').textContent = oGameWins;
                } else {
                    winner = 'Tie';
                    ties++;
                    document.getElementById('draws').textContent = ties;
                }
                statusDiv.textContent = `Game Over! X: ${xPoints} | O: ${oPoints} | Winner: ${winner}`;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusDiv.textContent = `Player ${currentPlayer}'s Turn`;
        }

        function resetGame() {
            gameBoard = Array(27).fill('');
            currentPlayer = 'X';
            gameActive = true;
            xPoints = 0;
            oPoints = 0;
            statusDiv.textContent = `Player ${currentPlayer}'s Turn`;
            document.getElementById('xPoints').textContent = '0';
            document.getElementById('oPoints').textContent = '0';

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>
